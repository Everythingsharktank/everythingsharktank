<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <!-- Background -->
  <rect width="800" height="800" fill="#0a0e1a" rx="160"/>
  
  <!-- Gradient definitions -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#f5c842" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sharkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#e6a500"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5c842"/>
    </linearGradient>
  </defs>
  
  <!-- Glow effect -->
  <rect width="800" height="800" fill="url(#glow)" rx="160"/>
  
  <!-- Shark fin icon (stylized) -->
  <!-- Main shark fin shape -->
  <path d="M 280 520 
             C 280 520 300 420 340 360 
             C 360 330 380 310 400 295
             C 420 310 440 330 460 360
             C 500 420 520 520 520 520 Z" 
        fill="url(#sharkGrad)" opacity="0.95"/>
  
  <!-- Shark body/wave at bottom -->
  <path d="M 200 520 
             Q 280 490 400 500 
             Q 520 490 600 520
             L 600 560
             Q 520 535 400 545
             Q 280 535 200 560 Z"
        fill="url(#sharkGrad)" opacity="0.7"/>
  
  <!-- Small wave dots -->
  <circle cx="240" cy="545" r="6" fill="#f5c842" opacity="0.5"/>
  <circle cx="560" cy="545" r="6" fill="#f5c842" opacity="0.5"/>
  
  <!-- TV screen frame (Shark Tank reference) -->
  <rect x="175" y="290" width="450" height="270" rx="20" fill="none" stroke="#f5c842" stroke-width="3" opacity="0.25"/>
  <rect x="185" y="300" width="430" height="250" rx="15" fill="none" stroke="#f5c842" stroke-width="1.5" opacity="0.15"/>
  
  <!-- EST badge -->
  <rect x="330" y="590" width="140" height="32" rx="16" fill="#f5c842" opacity="0.15" stroke="#f5c842" stroke-width="1" stroke-opacity="0.4"/>
  <text x="400" y="611" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#f5c842" text-anchor="middle" letter-spacing="3" opacity="0.8">EST 2026</text>
  
  <!-- Main text: EST -->
  <text x="400" y="680" 
        font-family="Arial Black, Impact, sans-serif" 
        font-size="52" 
        font-weight="900" 
        fill="url(#textGrad)" 
        text-anchor="middle"
        letter-spacing="-1">EVERYTHING</text>
  
  <text x="400" y="735" 
        font-family="Arial Black, Impact, sans-serif" 
        font-size="38" 
        font-weight="900" 
        fill="#f5c842" 
        text-anchor="middle"
        letter-spacing="4"
        opacity="0.9">SHARK TANK</text>
  
  <!-- Corner accents -->
  <line x1="160" y1="200" x2="190" y2="200" stroke="#f5c842" stroke-width="2" opacity="0.4"/>
  <line x1="160" y1="200" x2="160" y2="230" stroke="#f5c842" stroke-width="2" opacity="0.4"/>
  <line x1="640" y1="200" x2="610" y2="200" stroke="#f5c842" stroke-width="2" opacity="0.4"/>
  <line x1="640" y1="200" x2="640" y2="230" stroke="#f5c842" stroke-width="2" opacity="0.4"/>
</svg>
