<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#0d1020"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)" rx="80"/>
  
  <!-- Subtle grid lines -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  
  <!-- Shark fin - clean geometric -->
  <path d="M 400 160 L 480 420 L 400 390 L 320 420 Z" 
        fill="url(#gold)" filter="url(#glow)"/>
  
  <!-- Water line -->
  <path d="M 180 420 Q 290 400 400 410 Q 510 400 620 420 Q 510 435 400 430 Q 290 435 180 420 Z" 
        fill="url(#gold)" opacity="0.3"/>
  
  <!-- EST text -->
  <text x="400" y="540" 
        font-family="'Helvetica Neue', Arial, sans-serif" 
        font-size="28" font-weight="300"
        fill="#FFD700" text-anchor="middle" letter-spacing="12" opacity="0.8">EST 2026</text>
  
  <!-- Main wordmark -->
  <text x="400" y="615" 
        font-family="'Helvetica Neue', Arial Black, sans-serif" 
        font-size="58" font-weight="900"
        fill="#ffffff" text-anchor="middle" letter-spacing="-2">EVERYTHING</text>
  
  <!-- Divider -->
  <line x1="160" y1="635" x2="640" y2="635" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
  
  <text x="400" y="690" 
        font-family="'Helvetica Neue', Arial Black, sans-serif" 
        font-size="34" font-weight="700"
        fill="url(#gold)" text-anchor="middle" letter-spacing="8">SHARK TANK</text>
</svg>
